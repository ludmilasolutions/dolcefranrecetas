<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dolcefran — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#050302;--ink:#0f0e0c;--gold:#c9965a;--gold2:#e8c99a;
      --bone:#f0ede8;--muted:#3d3830;--red:#c0392b;--green:#27ae60;
      --ff-d:'Cormorant Garamond',serif;
      --ff-b:'Montserrat',sans-serif;
      --ff-m:'Space Mono',monospace;
    }
    html,body{min-height:100%;background:var(--bg);color:var(--bone);font-family:var(--ff-b)}
    a{color:var(--gold);text-decoration:none}
    input,textarea,select{
      width:100%;padding:.75rem 1rem;
      background:var(--ink);border:1px solid rgba(201,150,90,.25);
      color:var(--bone);font-family:var(--ff-b);font-size:.88rem;
      outline:none;transition:border-color .2s;
    }
    input:focus,textarea:focus{border-color:var(--gold)}
    input::placeholder,textarea::placeholder{color:var(--muted)}
    button{cursor:pointer;font-family:var(--ff-b)}

    /* LAYOUT */
    .admin-wrap{max-width:1100px;margin:0 auto;padding:2rem 4vw 6rem}
    .admin-header{display:flex;align-items:center;justify-content:space-between;
      padding:1.4rem 4vw;border-bottom:1px solid rgba(201,150,90,.15);
      position:sticky;top:0;background:rgba(5,3,2,.96);z-index:100;
      backdrop-filter:blur(8px)}
    .admin-logo{font-family:var(--ff-d);font-size:1.6rem;font-weight:300;letter-spacing:.2em}
    .admin-logo span{font-size:.75rem;font-family:var(--ff-m);color:var(--gold);
      letter-spacing:.1em;text-transform:uppercase;margin-left:.5rem;vertical-align:middle}

    /* BOTONES */
    .btn{display:inline-flex;align-items:center;gap:.5rem;
      padding:.7rem 1.6rem;font-size:.72rem;font-weight:500;
      letter-spacing:.12em;text-transform:uppercase;border:none;
      transition:all .25s}
    .btn-gold{background:var(--gold);color:var(--bg)}
    .btn-gold:hover{background:var(--gold2)}
    .btn-outline{background:transparent;border:1px solid rgba(201,150,90,.4);color:var(--bone)}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold)}
    .btn-danger{background:var(--red);color:#fff}
    .btn-danger:hover{background:#a93226}
    .btn-sm{padding:.45rem 1rem;font-size:.65rem}

    /* PANELS */
    #login-panel,#admin-panel{max-width:420px;margin:6rem auto 0}
    #admin-panel{max-width:100%;margin-top:0}
    .panel-title{font-family:var(--ff-d);font-size:2.5rem;font-weight:300;
      margin-bottom:2rem;letter-spacing:.05em}
    .form-group{display:flex;flex-direction:column;gap:.5rem;margin-bottom:1rem}
    .form-label{font-size:.65rem;font-family:var(--ff-m);letter-spacing:.15em;
      text-transform:uppercase;color:var(--gold)}
    .login-error{color:#e74c3c;font-size:.8rem;margin-top:.5rem;font-family:var(--ff-m)}

    /* TABS */
    .tabs{display:flex;gap:0;border-bottom:1px solid rgba(201,150,90,.2);margin-bottom:2.5rem}
    .tab{padding:.9rem 2rem;font-family:var(--ff-m);font-size:.7rem;
      letter-spacing:.12em;text-transform:uppercase;color:var(--muted);
      background:none;border:none;border-bottom:2px solid transparent;
      margin-bottom:-1px;cursor:pointer;transition:color .2s,border-color .2s}
    .tab.active{color:var(--gold);border-bottom-color:var(--gold)}

    /* SECCIÓN PRODUCTOS */
    .section-card{background:var(--ink);border:1px solid rgba(201,150,90,.12);padding:2rem;margin-bottom:2rem}
    .section-card h3{font-family:var(--ff-d);font-size:1.6rem;font-weight:400;margin-bottom:1.5rem}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr}}
    .form-grid .span-2{grid-column:span 2}
    @media(max-width:600px){.form-grid .span-2{grid-column:span 1}}

    /* TABLA PRODUCTOS */
    .prod-table{width:100%;border-collapse:collapse;font-size:.85rem}
    .prod-table th{text-align:left;padding:.7rem 1rem;
      font-family:var(--ff-m);font-size:.6rem;letter-spacing:.15em;
      text-transform:uppercase;color:var(--gold);
      border-bottom:1px solid rgba(201,150,90,.2)}
    .prod-table td{padding:.8rem 1rem;border-bottom:1px solid rgba(255,255,255,.04);
      vertical-align:middle}
    .prod-table tr:hover td{background:rgba(201,150,90,.04)}
    .prod-img{width:52px;height:40px;object-fit:cover;border:1px solid rgba(201,150,90,.2)}
    .prod-img-ph{width:52px;height:40px;background:var(--muted);display:flex;
      align-items:center;justify-content:center;font-size:.6rem;color:rgba(240,237,232,.3)}
    .badge{display:inline-block;padding:.2rem .6rem;font-family:var(--ff-m);
      font-size:.58rem;letter-spacing:.1em;text-transform:uppercase}
    .badge-on{background:rgba(39,174,96,.15);color:#2ecc71;border:1px solid rgba(39,174,96,.3)}
    .badge-off{background:rgba(192,57,43,.12);color:#e74c3c;border:1px solid rgba(192,57,43,.3)}
    .actions{display:flex;gap:.5rem}

    /* PEDIDOS */
    .order-card{background:var(--ink);border:1px solid rgba(201,150,90,.12);
      padding:1.5rem;margin-bottom:1rem}
    .order-head{display:flex;align-items:center;gap:1rem;margin-bottom:1rem;flex-wrap:wrap}
    .order-id{font-family:var(--ff-m);font-size:.68rem;color:var(--gold)}
    .order-date{font-family:var(--ff-m);font-size:.6rem;color:var(--muted)}
    .order-status{display:inline-block;padding:.25rem .8rem;font-family:var(--ff-m);
      font-size:.6rem;letter-spacing:.1em;text-transform:uppercase}
    .st-pendiente{background:rgba(243,156,18,.12);color:#f39c12;border:1px solid rgba(243,156,18,.3)}
    .st-confirmado{background:rgba(39,174,96,.12);color:#27ae60;border:1px solid rgba(39,174,96,.3)}
    .st-entregado{background:rgba(52,73,94,.3);color:var(--muted);border:1px solid rgba(52,73,94,.4)}
    .order-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}
    @media(max-width:600px){.order-grid{grid-template-columns:1fr}}
    .order-label{font-family:var(--ff-m);font-size:.6rem;letter-spacing:.1em;
      text-transform:uppercase;color:var(--gold);margin-bottom:.3rem}
    .order-val{font-size:.88rem;color:var(--bone)}
    .order-items{margin-top:.75rem}
    .order-item-row{display:flex;justify-content:space-between;
      font-size:.82rem;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,.04)}
    .order-total{display:flex;justify-content:space-between;
      margin-top:.75rem;font-family:var(--ff-d);font-size:1.2rem}
    .order-actions-row{display:flex;gap:.5rem;margin-top:1rem;flex-wrap:wrap}
    .empty-state{text-align:center;padding:4rem 0;font-family:var(--ff-m);
      font-size:.75rem;color:var(--muted);letter-spacing:.1em}

    /* TOAST */
    .toast{position:fixed;bottom:2rem;right:2rem;background:var(--gold);
      color:var(--bg);padding:.8rem 1.6rem;font-family:var(--ff-m);
      font-size:.72rem;letter-spacing:.1em;opacity:0;
      transform:translateY(10px);transition:all .3s;z-index:9999}
    .toast.show{opacity:1;transform:translateY(0)}

    /* IMAGEN PREVIEW */
    .img-preview{width:80px;height:60px;object-fit:cover;
      border:1px solid rgba(201,150,90,.25);margin-top:.5rem;display:none}
    .img-preview.visible{display:block}
    .edit-inline{display:flex;gap:.5rem;align-items:center}
    .edit-inline input{flex:1}
  </style>
</head>
<body>

<header class="admin-header">
  <div class="admin-logo">Dolcefran <span>Admin</span></div>
  <div id="header-actions" style="display:none">
    <button class="btn btn-outline btn-sm" id="btn-logout">Cerrar sesión</button>
  </div>
</header>

<!-- LOGIN -->
<div id="login-panel">
  <h2 class="panel-title">Acceso</h2>
  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" id="email" placeholder="admin@dolcefran.es"/>
  </div>
  <div class="form-group">
    <label class="form-label">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••"/>
  </div>
  <button class="btn btn-gold" id="btn-login" style="width:100%;justify-content:center;margin-top:.5rem">
    Iniciar sesión
  </button>
  <div class="login-error" id="login-error"></div>
</div>

<!-- ADMIN PANEL -->
<div id="admin-panel" style="display:none">
  <div class="tabs">
    <button class="tab active" data-tab="products">Productos</button>
    <button class="tab" data-tab="orders">Pedidos</button>
  </div>

  <div class="admin-wrap">

    <!-- TAB: PRODUCTOS -->
    <div id="tab-products">

      <div class="section-card">
        <h3>Nuevo Producto</h3>
        <form id="form-product">
          <div class="form-grid">
            <div class="form-group">
              <label class="form-label">Nombre</label>
              <input type="text" id="p-name" placeholder="Tarta de Chocolate Belga" required/>
            </div>
            <div class="form-group">
              <label class="form-label">Precio ($ ARS)</label>
              <input type="number" id="p-price" placeholder="1500.00" step="0.01" min="0" required/>
            </div>
            <div class="form-group span-2">
              <label class="form-label">Descripción</label>
              <textarea id="p-desc" rows="2" placeholder="Descripción del producto..."></textarea>
            </div>
            <div class="form-group span-2">
              <label class="form-label">Imagen</label>
              <input type="file" id="p-image" accept="image/*"/>
              <img class="img-preview" id="img-preview"/>
            </div>
          </div>
          <button type="submit" class="btn btn-gold">+ Crear producto</button>
        </form>
      </div>

      <div class="section-card">
        <h3>Lista de Productos</h3>
        <div style="overflow-x:auto">
          <table class="prod-table">
            <thead>
              <tr>
                <th>Img</th><th>Nombre</th><th>Precio</th><th>Estado</th><th>Acciones</th>
              </tr>
            </thead>
            <tbody id="products-tbody">
              <tr><td colspan="5" class="empty-state">Cargando...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- TAB: PEDIDOS -->
    <div id="tab-orders" style="display:none">
      <div id="orders-list">
        <div class="empty-state">Cargando pedidos...</div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';
  const SUPABASE_URL  = 'https://dgsbeahwcruisvyuufcq.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnc2JlYWh3Y3J1aXN2eXV1ZmNxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MTEzMDQsImV4cCI6MjA4ODA4NzMwNH0.lhM3Uqn4U2PeO3TtuRzlgKRGtsHPx6RgRrkFC5DUwj0';
  let sb;

  function initSB() {
    return new Promise(resolve => {
      (function try_() {
        if (window.supabase && window.supabase.createClient) {
          sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
          resolve();
        } else { setTimeout(try_, 80); }
      })();
    });
  }

  function fmtMoney(n) {
    return Number(n||0).toLocaleString('es-AR',{minimumFractionDigits:2,maximumFractionDigits:2});
  }

  function toast(msg, dur=3000) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    clearTimeout(el._t);
    el._t = setTimeout(() => el.classList.remove('show'), dur);
  }

  /* ── TABS ── */
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('tab-products').style.display = tab.dataset.tab === 'products' ? '' : 'none';
      document.getElementById('tab-orders').style.display   = tab.dataset.tab === 'orders'   ? '' : 'none';
      if (tab.dataset.tab === 'orders') loadOrders();
    });
  });

  /* ── AUTH ── */
  async function login() {
    const email    = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('login-error');
    errEl.textContent = '';
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) { errEl.textContent = error.message; return; }
    await checkAuth();
  }

  async function logout() {
    await sb.auth.signOut();
    location.reload();
  }

  async function checkAuth() {
    const { data: { user } } = await sb.auth.getUser();
    if (!user) return;
    const { data: admin } = await sb.from('admins').select('*').eq('id', user.id).single();
    if (!admin) {
      document.getElementById('login-error').textContent = 'Sin permisos de administrador.';
      await sb.auth.signOut(); return;
    }
    document.getElementById('login-panel').style.display = 'none';
    document.getElementById('admin-panel').style.display = '';
    document.getElementById('header-actions').style.display = '';
    await loadProducts();
  }

  document.getElementById('btn-login').addEventListener('click', login);
  document.getElementById('btn-logout').addEventListener('click', logout);
  document.getElementById('email').addEventListener('keydown', e => { if(e.key==='Enter') login(); });
  document.getElementById('password').addEventListener('keydown', e => { if(e.key==='Enter') login(); });

  /* ── IMAGEN PREVIEW ── */
  document.getElementById('p-image').addEventListener('change', e => {
    const file = e.target.files[0];
    const prev = document.getElementById('img-preview');
    if (file) { prev.src = URL.createObjectURL(file); prev.classList.add('visible'); }
    else { prev.classList.remove('visible'); }
  });

  /* ── PRODUCTOS ── */
  async function loadProducts() {
    const tbody = document.getElementById('products-tbody');
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Cargando...</td></tr>';
    const { data, error } = await sb.from('products').select('*').order('created_at',{ascending:false});
    if (error) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Error cargando.</td></tr>'; return; }
    if (!data.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No hay productos.</td></tr>'; return; }

    tbody.innerHTML = '';
    data.forEach(p => {
      const tr = document.createElement('tr');
      const img = p.image_url
        ? `<img src="${p.image_url}" class="prod-img" alt="${p.name}"/>`
        : `<div class="prod-img-ph">SIN IMG</div>`;
      tr.innerHTML = `
        <td>${img}</td>
        <td style="font-family:var(--ff-d);font-size:1.05rem">${p.name}</td>
        <td style="font-family:var(--ff-m);font-size:.8rem;color:var(--gold)">$ ${fmtMoney(p.price)}</td>
        <td><span class="badge ${p.active ? 'badge-on' : 'badge-off'}">${p.active ? 'Activo' : 'Inactivo'}</span></td>
        <td>
          <div class="actions">
            <button class="btn btn-outline btn-sm" data-id="${p.id}" data-action="toggle">
              ${p.active ? 'Desactivar' : 'Activar'}
            </button>
            <button class="btn btn-danger btn-sm" data-id="${p.id}" data-action="delete">Eliminar</button>
          </div>
        </td>`;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id  = btn.dataset.id;
        const act = btn.dataset.action;
        if (act === 'delete') {
          if (!confirm('¿Eliminar este producto?')) return;
          await sb.from('products').delete().eq('id', id);
          toast('Producto eliminado');
        } else if (act === 'toggle') {
          const { data: prod } = await sb.from('products').select('active').eq('id',id).single();
          await sb.from('products').update({ active: !prod.active }).eq('id', id);
          toast('Estado actualizado');
        }
        await loadProducts();
      });
    });
  }

  document.getElementById('form-product').addEventListener('submit', async e => {
    e.preventDefault();
    const name  = document.getElementById('p-name').value;
    const price = parseFloat(document.getElementById('p-price').value);
    const desc  = document.getElementById('p-desc').value;
    const file  = document.getElementById('p-image').files[0];

    let imageUrl = '';
    if (file) {
      const path = 'products/' + Date.now() + '_' + file.name;
      const { error: upErr } = await sb.storage.from('images').upload(path, file);
      if (upErr) { toast('Error subiendo imagen: ' + upErr.message); return; }
      const { data: urlData } = sb.storage.from('images').getPublicUrl(path);
      imageUrl = urlData.publicUrl;
    }

    const { error } = await sb.from('products').insert([{ name, description: desc, price, image_url: imageUrl, active: true }]);
    if (error) { toast('Error: ' + error.message); return; }

    document.getElementById('form-product').reset();
    document.getElementById('img-preview').classList.remove('visible');
    toast('✓ Producto creado');
    await loadProducts();
  });

  /* ── PEDIDOS ── */
  async function loadOrders() {
    const el = document.getElementById('orders-list');
    el.innerHTML = '<div class="empty-state">Cargando pedidos...</div>';
    const { data: orders, error } = await sb.from('orders').select('*').order('created_at',{ascending:false});
    if (error) { el.innerHTML = '<div class="empty-state">Error cargando pedidos.</div>'; return; }
    if (!orders.length) { el.innerHTML = '<div class="empty-state">No hay pedidos aún.</div>'; return; }

    el.innerHTML = '';
    for (const o of orders) {
      const { data: items } = await sb.from('order_items').select('*').eq('order_id', o.id);
      const date = new Date(o.created_at).toLocaleString('es-AR');
      const card = document.createElement('div');
      card.className = 'order-card';
      card.innerHTML = `
        <div class="order-head">
          <span class="order-id">#${o.id.slice(0,8)}</span>
          <span class="order-status st-${o.status||'pendiente'}">${o.status||'pendiente'}</span>
          <span class="order-date">${date}</span>
        </div>
        <div class="order-grid">
          <div>
            <div class="order-label">Cliente</div>
            <div class="order-val">${o.customer_name}</div>
            <div class="order-label" style="margin-top:.75rem">Teléfono</div>
            <div class="order-val"><a href="tel:${o.phone}">${o.phone}</a></div>
            <div class="order-label" style="margin-top:.75rem">Dirección</div>
            <div class="order-val">${o.address||'—'}</div>
            ${o.notes ? `<div class="order-label" style="margin-top:.75rem">Notas</div><div class="order-val">${o.notes}</div>` : ''}
          </div>
          <div>
            <div class="order-label">Productos</div>
            <div class="order-items">
              ${(items||[]).map(it=>`
                <div class="order-item-row">
                  <span>${it.quantity}× ${it.product_name}</span>
                  <span>$ ${fmtMoney(it.price*it.quantity)}</span>
                </div>`).join('')}
            </div>
            <div class="order-total">
              <span>Total</span>
              <span style="color:var(--gold)">$ ${fmtMoney(o.total)}</span>
            </div>
          </div>
        </div>
        <div class="order-actions-row">
          <button class="btn btn-outline btn-sm" data-oid="${o.id}" data-st="pendiente">Pendiente</button>
          <button class="btn btn-outline btn-sm" data-oid="${o.id}" data-st="confirmado">Confirmar</button>
          <button class="btn btn-gold btn-sm"    data-oid="${o.id}" data-st="entregado">Entregado</button>
        </div>`;
      el.appendChild(card);
    }

    el.querySelectorAll('button[data-oid]').forEach(btn => {
      btn.addEventListener('click', async () => {
        await sb.from('orders').update({ status: btn.dataset.st }).eq('id', btn.dataset.oid);
        toast('Estado actualizado');
        await loadOrders();
      });
    });
  }

  /* ── INIT ── */
  initSB().then(checkAuth);
})();
</script>
</body>
</html>
