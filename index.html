<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dolcefran - Pasteleria premium</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="style.css" />
  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  
 </head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">Dolcefran</div>
      <nav class="nav-links" aria-label="main navigation">
        <a href="#catalog">Catálogo</a>
        <a href="#cart">Carrito</a>
        <a href="/admin/admin.html" target="_blank" rel="noopener">Admin</a>
      </nav>
    </div>
  </header>

  <section class="hero container" aria-label="hero">
    <h1>Pasteleria premium Dolcefran</h1>
    <p>Delicias artesanales con ingredientes de alta calidad. Entra y descubre nuestro catálogo.</p>
  </section>

  <main class="container" id="catalog" aria-label="catalogo">
    <h2>Catálogo de productos</h2>
    <div id="loader" class="loader">Cargando productos...</div>
    <section id="products" class="grid"></section>
  </main>

  <aside id="cart" class="container cart" aria-label="carrito">
    <h3>Carrito</h3>
    <div id="cart-items" class="cart-items"></div>
    <div class="cart-total">Total: <span id="cart-total">0.00</span> €</div>
    <button id="btn-checkout" class="btn btn-primary">Finalizar pedido</button>
  </aside>

  <footer class="container footer">
    Dolcefran - © <span id="year"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
