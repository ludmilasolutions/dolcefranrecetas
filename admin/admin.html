<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dolcefran Admin</title>
  <link rel="stylesheet" href="../style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/supabase.min.js"></script>
  <script>
    // Configuracion de Supabase (reemplazar al desplegar)
    const SUPABASE_URL = "https://dgsbeahwcruisvyuufcq.supabase.co";
    const SUPABASE_ANON_KEY = "REPLACE_WITH_YOUR_ANON_KEY";
  </script>
</head>
<body>
  <div class="container" id="admin-container">
    <h1>Dolcefran - Admin</h1>
    <section id="login-panel" aria-label="login">
      <h2>Acceso</h2>
      <input type="email" id="email" placeholder="Email" />
      <input type="password" id="password" placeholder="Contraseña" />
      <button id="btn-login" class="btn btn-primary">Iniciar Sesion</button>
      <div id="login-error" style="color:red; margin-top:8px;"></div>
    </section>

    <section id="admin-panel" aria-label="panel-admin" style="display:none;">
      <button id="btn-logout" class="btn" style="float:right;">Cerrar Sesion</button>
      <h2>Gestion de Productos</h2>
      <form id="form-create-product" style="display:flex; flex-direction:column; gap:8px; max-width:600px;">
        <input type="text" id="p-name" placeholder="Nombre del producto" required />
        <textarea id="p-desc" placeholder="Descripcion" rows="3"></textarea>
        <input type="number" id="p-price" placeholder="Precio" step="0.01" required />
        <input type="file" id="p-image" accept="image/*" />
        <button type="submit" class="btn btn-primary">Crear producto</button>
      </form>
      <section id="products-list" aria-label="lista-productos" style="margin-top:16px;">
        <h3>Lista de productos</h3>
        <table style="width:100%; border-collapse:collapse;">
          <thead><tr><th>Img</th><th>Nombre</th><th>Precio</th><th>Activo</th><th>Acciones</th></tr></thead>
          <tbody id="products-tbody"></tbody>
        </table>
      </section>
      <section id="orders-section" aria-label="pedidos" style="margin-top:32px;">
        <h2>Pedidos recibidos</h2>
        <div id="orders-list"></div>
      </section>
    </section>
  </div>
  <script src="admin.js"></script>
</body>
</html>
